<!doctype html>
<head>
  <title>Forms</title>
</head>
<body>
   <p align="center"><a href="index.html" target="_blank">Table_1</a>&nbsp;|&nbsp;
    <a href="Table_2.html" target="_blank">Table_2</a>&nbsp;|&nbsp;
    <a href="Table_4.html" target="_blank">Table_4</a></p>
  <table
    border="2"
    cellspacing="0"
    width="90%"
    bordercolor="white"
    cellspacing="200px"
    align="center"
    cellpadding="20"
  >
    <tr align="center">
      <td>
        <table
          align="center"
          border="2"
          bordercolor="white"
          cellspacing="0"
          width="400"
          bgcolor="lightyellow"
        >
          <tr>
            <th align="center">Login Form</th>
          </tr>
          <form>
            <tr>
              <td>
                <table
                  align="center"
                  border="2"
                  bordercolor="black"
                  cellspacing="0"
                  bgcolor="lightblue"
                >
                  <tr>
                    <td>
                      <label>User Name :</label>
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <label>Password :</label>
                    </td>
                    <td>
                      <input type="password" />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td><input type="checkbox" />Remember Me:</td>
            </tr>
            <tr>
              <td>
                <input
                  style="margin-left: 210px; background-color: blue"
                  type="submit"
                  value="Login"
                />
                <input style="margin-left: 0px" type="submit" value="Reset" />
              </td>
            </tr>
          </form>
        </table>
      </td>
      <br />
      <td colspan="2">
        <table
          align="center"
          border="2"
          bordercolor="white"
          cellspacing="0"
          height="10"
          width="400"
          bgcolor="lightyellow"
        >
          <tr>
            <th align="center">Event Registration :</th>
          </tr>
          <form>
            <tr>
              <td>
                <table
                  align="center"
                  border="2"
                  bordercolor="lightblue"
                  cellspacing="0"
                  width="400"
                  bgcolor="lightblue"
                >
                  <tr>
                    <td>
                      <label>Name :</label>
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                    <td rowspan="3">
                      <img height="150" width="100" src="https://static.vecteezy.com/system/resources/previews/009/960/320/non_2x/bunch-balloons-party-free-vector.jpg"
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <label>Email :</label>
                    </td>
                    <td>
                      <input type="email" />
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <label>Select Event :</label>
                    </td>
                    <td>
                      <select>
                        <option>Conference</option>
                        <option>Workshop</option>
                        <option>Seminar</option>
                      </select>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td>
                <input
                  style="margin-left: 210px; background-color: blue"
                  type="submit"
                  value="Login"
                />
                <input style="margin-left: 0px" type="submit" value="Reset" />
              </td>
            </tr>
          </form>
        </table>
      </td>
    </tr>
    <tr align="center">
      <td>
        <table
          align="center"
          border="2"
          bordercolor="white"
          cellspacing="0"
          height="10"
          width="350"
          bgcolor="lightyellow"
        >
          <tr>
            <th align="center">Survey Form</th>
          </tr>
          <form>
            <tr>
              <td>
                <table
                  align="center"
                  border="2"
                  bordercolor="lightblue"
                  cellspacing="0"
                >
                  <tr>
                    <td>
                      <b>How satisfied are you?</b>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <input type="radio" name="satisfied" />Very Satisfied
                    </td>
                  </tr>
                  <tr>
                    <td><input type="radio" name="satisfied" />Neutral</td>
                  </tr>
                  <tr>
                    <td><input type="radio" name="satisfied" />Disatisfied</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td>
                <label>Comments:</label><br />
                <textarea rows="3" cols="40"></textarea>
              </td>
            </tr>

            <tr>
              <td>
                <input
                  style="margin-left: 210px; background-color: blue"
                  type="submit"
                />
                <input style="margin-left: 0px" type="submit" value="Clear" />
              </td>
            </tr>
          </form>
        </table>
      </td>
      <td>
        <table
          align="center"
          border="2"
          bordercolor="white"
          cellspacing="0"
          width="350"
          bgcolor="lightyellow"
        >
          <tr>
            <th align="center">Hotel Booking</th>
          </tr>
          <form>
            <tr>
              <td>
                <table
                  align="center"
                  border="2"
                  bordercolor="lightblue"
                  cellspacing="0"
                >
                  <tr>
                    <td align="center" colspan="2">
                      <img
                        height="70"
                        width="300"
                        src="https://r1imghtlak.ibcdn.com/a04ee142-ecd2-4783-9598-53ad7d9d71e2.jpg"
                      />
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <label>Check-In Date :</label>
                    </td>
                    <td>
                      <input type="date" />
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <label>Check-out Date :</label>
                    </td>
                    <td>
                      <input type="date" />
                    </td>
                  </tr>
                  <tr>
                    <td>Number of Guests:</td>
                    <td>
                      <input
                        style="width: 140px"
                        type="number"
                        value="Number of Guests"
                        min="1"
                        max="25"
                      />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td>
                <input
                  style="margin-left: 150px; background-color: blue"
                  type="submit"
                  value="Book Now"
                />
                <input style="margin-left: 0px" type="submit" value="Cancel" />
              </td>
            </tr>
          </form>
        </table>
      </td>
      <td>
        <table
          align="center"
          border="2"
          bordercolor="white"
          cellspacing="0"
          height="10"
          width="400"
          bgcolor="lightyellow"
        >
          <tr>
            <th align="center">Job Application</th>
          </tr>
          <form>
            <tr>
              <td>
                <table
                  align="center"
                  border="2"
                  bordercolor="lightblue"
                  cellspacing="0"
                  bgcolor="lightblue"
                >
                  <tr>
                    <td>
                      <label>Full Name :</label>
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <label>Position Applied :</label>
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td>
                <p style="padding-left: 70px"><b>Qualifications:</b></p>
                <ol style="padding-left: 100px">
                  <li>Resume Upload</li>
                  <li>Cover Letter</li>
                  <li>References</li>
                </ol>
              </td>
            </tr>

            <tr>
              <td>
                <input
                  style="margin-left: 165px; background-color: blue"
                  type="submit"
                  value="Apply"
                />
                <input style="margin-left: 0px" type="submit" value="Reset" />
              </td>
            </tr>
          </form>
        </table>
      </td>
    </tr>
  </table>
</body>
